name: Release repub-reader

on:
  push:
    tags:
      - 'repub-reader-v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build repub-reader
        run: pnpm run build --filter=@portfolio/repub-reader

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/repub-reader-v}" >> $GITHUB_OUTPUT

      - name: Pack tarball
        working-directory: packages/repub-reader
        run: npm pack

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: repub-reader ${{ steps.version.outputs.VERSION }}
          files: packages/repub-reader/portfolio-repub-reader-*.tgz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
