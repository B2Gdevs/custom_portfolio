name: Release repub-builder

on:
  push:
    tags:
      - 'repub-v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build repub-builder
        run: pnpm run build --filter=@portfolio/repub-builder

      - name: Update README version
        run: node scripts/update-readme-version.cjs

      - name: Commit README if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/repub-builder/README.md
          git diff --staged --quiet || git commit -m "chore(repub-builder): update README version for release"
          git push || true

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/repub-v}" >> $GITHUB_OUTPUT

      - name: Pack tarball
        working-directory: packages/repub-builder
        run: npm pack

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: repub-builder ${{ steps.version.outputs.VERSION }}
          files: packages/repub-builder/portfolio-repub-builder-*.tgz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
